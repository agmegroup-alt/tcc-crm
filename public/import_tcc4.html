function log(msg, cls) {
  const d = document.getElementById("log");
  const div = document.createElement("div");
  div.className = cls||"";
  div.textContent = msg;
  d.appendChild(div);
  d.scrollTop = d.scrollHeight;
}

async function runImport() {
  const btn = document.getElementById("btn");
  btn.disabled = true;
  btn.textContent = "Importing...";
  document.getElementById("log").innerHTML = "";
  document.getElementById("progress").style.display = "block";

  const {data:existing} = await SB.from("influencers").select("handle");
  const existing_set = new Set((existing||[]).map(r=>r.handle.toLowerCase()));
  log("Found "+existing_set.size+" contacts in CRM", "skip");
  log("Starting import of "+HANDLES.length+" handles...", "skip");
  log("", "");

  let added=0, skipped=0;
  const today = new Date().toISOString().split("T")[0];
  const bar = document.getElementById("bar");

  for (let idx=0; idx<HANDLES.length; idx++) {
    const h = HANDLES[idx];
    bar.style.width = Math.round((idx+1)/HANDLES.length*100)+"%";

    if (existing_set.has(h.toLowerCase())) {
      skipped++;
      continue;
    }

    const inf = {
      id: Date.now().toString()+Math.random().toString(36).slice(2,5),
      name:"", handle:h, account:"tcc",
      niche:"", followers:"", engagement:"",
      email:"", location:"",
      igUrl:"https://www.instagram.com/"+h,
      fitScore:5, fitReason:"", bestAngle:"",
      status:"active", steps:{}, notes:"", addedDate:today,
    };

    const {error} = await SB.from("influencers").upsert(
      {handle:h, data:inf, updated_at:new Date().toISOString()},
      {onConflict:"handle"}
    );

    if (error) { log("ERR @"+h+" — "+error.message, "err"); }
    else { added++; if(added%10===0) log("Added "+added+" so far...", "ok"); }

    if (idx%50===49) await new Promise(r=>setTimeout(r,300));
    else await new Promise(r=>setTimeout(r,40));
  }

  log("", "");
  log("Done. Added: "+added+"  |  Skipped (duplicates): "+skipped, "bold");
  log("Open tcc-crm.vercel.app — The Coffee Code tab", "skip");
  btn.textContent = "Done — "+added+" added";
}
