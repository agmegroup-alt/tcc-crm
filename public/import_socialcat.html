function log(msg, cls) {
  const d = document.getElementById("log");
  const div = document.createElement("div");
  div.className = cls||"";
  div.textContent = msg;
  d.appendChild(div);
  d.scrollTop = d.scrollHeight;
}

async function runImport() {
  const btn = document.getElementById("btn");
  btn.disabled = true;
  btn.textContent = "Importing...";
  document.getElementById("log").innerHTML = "";
  document.getElementById("progress").style.display = "block";

  const {data:existing} = await SB.from("influencers").select("handle");
  const existing_set = new Set((existing||[]).map(r=>r.handle.toLowerCase()));
  log("Found "+existing_set.size+" contacts already in CRM", "skip");
  log("Starting import of "+CONTACTS.length+" contacts...", "skip");
  log("", "");

  let added=0, skipped=0, errors=0;
  const today = new Date().toISOString().split("T")[0];
  const bar = document.getElementById("bar");

  for (let idx=0; idx<CONTACTS.length; idx++) {
    const c = CONTACTS[idx];
    bar.style.width = Math.round((idx+1)/CONTACTS.length*100)+"%";

    if (existing_set.has(c.handle.toLowerCase())) {
      skipped++;
      continue;
    }

    const inf = {
      id: Date.now().toString()+Math.random().toString(36).slice(2,5),
      name: c.name, handle: c.handle, account: "tcc",
      niche: c.niche, followers: c.followers, engagement: c.engagement,
      email: c.email, location: c.location, igUrl: c.igUrl,
      fitScore: 7, fitReason: "", bestAngle: "",
      status: "active", steps: {}, notes: "", addedDate: today,
    };

    const {error} = await SB.from("influencers").upsert(
      {handle:c.handle, data:inf, updated_at:new Date().toISOString()},
      {onConflict:"handle"}
    );

    if (error) {
      log("ERR @"+c.handle+" — "+error.message, "err");
      errors++;
    } else {
      added++;
      if (added % 20 === 0) log("Added "+added+" so far...", "ok");
    }

    // Small delay every 50 to avoid rate limiting
    if (idx % 50 === 49) await new Promise(r=>setTimeout(r,200));
    else await new Promise(r=>setTimeout(r,30));
  }

  log("", "");
  log("─────────────────────────────────────────", "skip");
  log("Done! Added: "+added+"  |  Skipped (duplicates): "+skipped+"  |  Errors: "+errors, "bold");
  log("Open tcc-crm.vercel.app to see your contacts.", "skip");
  btn.textContent = "Done — "+added+" added";
}
