<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TCC Influencer CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060504;color:#e4dccb;font-family:Georgia,serif;font-size:13px;height:100vh;overflow:hidden}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:#060504}
#loading p{color:#c9943a;font-family:monospace;font-size:12px;letter-spacing:2px}
#loading small{color:#4a3c24;font-family:monospace;font-size:10px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#080705}
::-webkit-scrollbar-thumb{background:#2a2518;border-radius:2px}
input,textarea{background:#0f0d08;border:1px solid #1e1b12;color:#e4dccb;padding:7px 10px;border-radius:3px;font-family:monospace;font-size:12px;outline:none}
input:focus,textarea:focus{border-color:#c9943a60!important;box-shadow:0 0 0 1px #c9943a20}
button{cursor:pointer;transition:opacity .12s;font-family:monospace}
button:hover{opacity:.82}
button:disabled{opacity:.4;cursor:not-allowed}
</style>
</head>
<body>
<div id="loading"><div style="font-size:28px">☕</div><p>TCC CRM</p><small>loading...</small></div>
