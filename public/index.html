function exJSON(text){
if(!text) return null;
let t=text.replace(/`json\s*/gi,"").replace(/`\s*/g,””).trim();
try{return JSON.parse(t)}catch{}
const s=t.indexOf(”{”),e=t.lastIndexOf(”}”);
if(s!==-1&&e>s){try{return JSON.parse(t.slice(s,e+1))}catch{}}
return null;
}

async function callClaude(content, maxTokens){
maxTokens = maxTokens || 1200;
const r=await fetch(“https://api.anthropic.com/v1/messages”,{
method:“POST”,
headers:{“Content-Type”:“application/json”,“anthropic-dangerous-direct-browser-access”:“true”},
body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:maxTokens,messages:[{role:“user”,content}]})
});
if(!r.ok){const e=await r.text().catch(()=>r.statusText);throw new Error(“API “+r.status+”: “+e.slice(0,200));}
const d=await r.json();
return (d.content&&d.content[0]&&d.content[0].text)||””;
}

async function dbLoad(){
const res=await sb.from(“influencers”).select(”*”).order(“id”,{ascending:false});
if(res.error) throw res.error;
return (res.data||[]).map(function(row){ return Object.assign({},row.data,{handle:row.handle}); });
}

async function dbSave(inf){
const handle=inf.handle;
const data=Object.assign({},inf);
delete data.handle;
const res=await sb.from(“influencers”).upsert({handle:handle,data:data,updated_at:new Date().toISOString()},{onConflict:“handle”});
if(res.error) console.error(“Save:”,res.error.message);
}

async function dbDel(handle){
await sb.from(“influencers”).delete().eq(“handle”,handle);
}

});});

“TCC: grown, processed, dried, rested, and roasted on Finca La Maria in Antioquia, Colombia.\n”+
“Air-shipped within days of roasting. Harvest date + roast date on every bag.\n\n”+
“Reply with ONLY a JSON object. No markdown. Start with { and end with }.\n\n”+
‘{“inferredName”:“first name or Unknown”,“estimatedFollowers”:“range like 50K-200K”,“estimatedEngagement”:“range like 3-6%”,“inferredNiche”:“most likely niche”,“inferredLocation”:“US city or United States”,“contentStyle”:“2 sentences on content style”,“tccFitScore”:7,“tccFitReason”:“2 sentences on TCC fit”,“audienceProfile”:“1 sentence on followers”,“bestAngle”:“best DM hook for TCC”,“redFlags”:“concerns or None”,“suggestedTier”:“T1”,“tierLabel”:“Specialty Coffee”,“outreachPriority”:“High”,“recommendedFirstAction”:“1 action today”,“dmTiming”:“best day and time”,“sampleStrategy”:“which TCC angle resonates”,“notes”:“other intelligence”}’
);
profile=exJSON(raw);

}catch(e){
setLoadErr(e.message);
profile=mkFallback();
}
if(typeof profile.tccFitScore!==“number”) profile.tccFitScore=parseInt(profile.tccFitScore)||5;
const newInf=Object.assign({handle:”@”+h,stage:“researched”,actions:{},dmDate:null,sampleDate:null,firstPostDate:null,addedDate:tod(),notes:””},profile);
await dbSave(newInf);
const fresh=await dbLoad();
setInfs(fresh);
const saved=fresh.find(function(i){return i.handle===”@”+h;})||newInf;
setSel(saved); setHdl(””); setShowAdd(false); setTab(“profile”); setNotes(””); setDmText(””);
setLoading(false);
}

                <div onClick={function(){tickAction(sel.handle,action.id);}}

                <div style={{flex:1}}>
                  <div style={{fontSize:"11px",color:checked?C.muted:isNext?C.gold:C.text,textDecoration:checked?"line-through":"none"}}>{action.label}</div>
                  {action.adv&&<div style={{fontSize:"9px",color:C.dim,fontFamily:"monospace",marginTop:"1px"}}>{gs(action.adv).label}</div>}

                {action.id==="first_contact" &&sel.dmDate    &&checked&&<div style={{fontSize:"9px",color:C.dim,fontFamily:"monospace"}}>{sel.dmDate}</div>}
                {action.id==="sample_shipped"&&sel.sampleDate&&checked&&<div style={{fontSize:"9px",color:C.dim,fontFamily:"monospace"}}>{sel.sampleDate}</div>}

            <div style={{fontSize:"9px",color:C.dim,fontFamily:"monospace"}}>Opener · Follow-up · Sample Pitch</div>

        {tab==="notes"&&(

    )}
  </div>
