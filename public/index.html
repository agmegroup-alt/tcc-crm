<body>
<div id="root" style="height:100vh;display:flex;align-items:center;justify-content:center;color:#c9943a;font-family:monospace">Loading...</div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;
const SB=supabase.createClient("https://zotmzaezodgszcjbfktt.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvdG16YWV6b2Rnc3pjamJma3R0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODQ1MzAsImV4cCI6MjA5MDU2MDUzMH0.wGxNInF52zyhwHsDvuWJDRpVrxgDBgCCOVlq0rTHhyE");
const G="#c9943a",BG="#060504",PAN="#0c0b08",CARD="#100f0b",BOR="#1e1b12",DIM="#3a3020",MUT="#7a6840",TXT="#e4dccb";
const STATUSES=[{id:"active",label:"Active",color:"#10b981"},{id:"converting",label:"Converting",color:"#c9943a"},{id:"paused",label:"Paused",color:"#6b7280"},{id:"declined",label:"Declined",color:"#ef4444"}];
const STAGES=[
  {id:"discovery",label:"Discovery",color:"#6366f1",steps:[
    {id:"s1_1",label:"Search hashtags: #specialtycoffee #coffeeaddict #espresso"},
    {id:"s1_2",label:"Verify follower count (5K-500K)"},

  ]},
  {id:"warmup",label:"Warm-Up",color:"#f59e0b",steps:[
    {id:"s2_1",label:"Follow their account"},
    {id:"s2_2",label:"Like their 3 most recent posts"},
    {id:"s2_3",label:"Leave genuine comment on most recent post"},
    {id:"s2_4",label:"Reply to their Story (Day 1)"},
    {id:"s2_5",label:"Like 2 more posts (Day 2)"},
    {id:"s2_6",label:"Comment on a second post (Day 3)"},
  ]},

  ]},
  {id:"conversion",label:"Conversion",color:"#10b981",steps:[
    {id:"s6_1",label:"Confirm first sale tracked in affiliate dashboard"},
    {id:"s6_2",label:"Pay first commission - confirm received"},

    {id:"s6_4",label:"Re-engagement DM at 30 days"},
    {id:"s6_5",label:"Offer exclusive deal or code for their audience"},
    {id:"s6_6",label:"Lock in long-term partnership terms"},
  ]},
];
const TOTAL=STAGES.reduce((a,s)=>a+s.steps.length,0);
const tod=()=>new Date().toISOString().split("T")[0];
const sc=n=>n>=8?"#10b981":n>=6?"#c9943a":n>=4?"#f59e0b":"#ef4444";
function pct(inf,sid){const s=STAGES.find(x=>x.id===sid);if(!s)return 0;return Math.round(s.steps.filter(x=>(inf.steps||{})[x.id]).length/s.steps.length*100);}
function overall(inf){return Math.round(Object.values(inf.steps||{}).filter(Boolean).length/TOTAL*100);}
function curStage(inf){for(let i=STAGES.length-1;i>=0;i--){if(pct(inf,STAGES[i].id)>0)return STAGES[i];}return STAGES[0];}
function exJSON(t){if(!t)return null;let s=t.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();try{return JSON.parse(s)}catch(e){}const i=s.indexOf("{"),j=s.lastIndexOf("}");if(i!==-1&&j>i){try{return JSON.parse(s.slice(i,j+1))}catch(e){}}return null;}
async function ai(content,max=1200){
  const r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,messages:[{role:"user",content}]})});
  if(!r.ok)throw new Error("API "+r.status);
  const d=await r.json();return(d.content&&d.content[0]&&d.content[0].text)||"";
}
async function dbLoad(){const{data,error}=await SB.from("influencers").select("*").order("id",{ascending:false});if(error)throw error;return(data||[]).map(r=>({...r.data,_h:r.handle}));}
async function dbSave(inf){const{_h,...data}=inf;const handle=inf.handle||_h;await SB.from("influencers").upsert({handle,data,updated_at:new Date().toISOString()},{onConflict:"handle"});}
async function dbDel(h){await SB.from("influencers").delete().eq("handle",h);}

const pill=(on,col=G,sm=false)=>({padding:sm?"2px 7px":"3px 9px",background:on?col+"18":"transparent",border:"1px solid "+(on?col:BOR),color:on?col:MUT,fontFamily:"monospace",fontSize:sm?"9px":"10px",borderRadius:"2px",cursor:"pointer"});
const btn=(col=G)=>({background:col+"18",border:"1px solid "+col+"50",color:col,fontFamily:"monospace",fontSize:"11px",padding:"6px 14px",borderRadius:"3px",cursor:"pointer"});

function Bar({pct:p,color=G,h=4,style={}}){
  return <div style={{height:h,background:BOR,borderRadius:"2px",overflow:"hidden",...style}}>
    <div style={{height:"100%",width:p+"%",background:color,transition:"width .3s"}}/>
  </div>;
}

function Stage({inf,stage,onToggle,dmText,onGenDM,dmLoad,dmErr}){
  const [open,setOpen]=useState(false);
  const p=pct(inf,stage.id);
  const done=stage.steps.filter(s=>(inf.steps||{})[s.id]).length;
  return <div style={{border:"1px solid "+BOR,borderRadius:"4px",marginBottom:"6px",overflow:"hidden"}}>
    <div onClick={()=>setOpen(v=>!v)} style={{padding:"10px 12px",background:PAN,cursor:"pointer",display:"flex",alignItems:"center",gap:"10px"}}>
      <div style={{width:"8px",height:"8px",borderRadius:"50%",background:stage.color,flexShrink:0}}/>
      <div style={{flex:1}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
          <span style={{fontSize:"11px",fontWeight:"bold",color:p===100?stage.color:TXT}}>{stage.label}</span>
          <span style={{fontSize:"9px",fontFamily:"monospace",color:p===100?stage.color:MUT}}>{done}/{stage.steps.length}{p===100?" v":""}</span>
        </div>
        <Bar pct={p} color={stage.color} h={3}/>
      </div>
      <span style={{color:MUT,fontSize:"10px"}}>{open?"^":"v"}</span>
    </div>
    {open && <div style={{padding:"10px 12px",background:CARD}}>
      {stage.steps.map(step=>{
        const checked=!!(inf.steps||{})[step.id];
        return <div key={step.id} onClick={()=>onToggle(step.id)} style={{display:"flex",gap:"9px",marginBottom:"7px",cursor:"pointer",alignItems:"flex-start"}}>
          <div style={{width:"15px",height:"15px",borderRadius:"3px",flexShrink:0,marginTop:"1px",border:"2px solid "+(checked?stage.color:BOR),background:checked?stage.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
            {checked&&<span style={{color:"#000",fontSize:"9px",fontWeight:"bold"}}>v</span>}
          </div>
          <span style={{fontSize:"11px",color:checked?MUT:TXT,textDecoration:checked?"line-through":"none",lineHeight:"1.5"}}>{step.label}</span>
        </div>;
      })}
      {stage.id==="outreach" && <div style={{marginTop:"10px",borderTop:"1px solid "+BOR,paddingTop:"10px"}}>
        <button onClick={onGenDM} disabled={dmLoad} style={{...btn(G),width:"100%",marginBottom:"8px"}}>{dmLoad?"Generating...":"Generate Day 1 / Day 3 / Day 7 DMs"}</button>
        {dmErr && <div style={{fontSize:"10px",color:"#ef4444",marginBottom:"6px",fontFamily:"monospace"}}>{dmErr}</div>}
        {dmText && <div style={{background:PAN,border:"1px solid "+BOR,borderRadius:"3px",padding:"10px"}}>
          {dmText.split("\n").map((line,i)=>{
            const isH=/^(DAY 1|DAY 3|DAY 7):/.test(line);
            return <div key={i} style={{color:isH?G:TXT,fontStyle:isH?"normal":"italic",fontWeight:isH?"bold":"normal",marginTop:isH&&i>0?"10px":"0",fontSize:isH?"8px":"11px",letterSpacing:isH?"1.5px":"0",lineHeight:"1.75",fontFamily:isH?"monospace":"Georgia,serif"}}>{line}</div>;
          })}
        </div>}
      </div>}
    </div>}
  </div>;
}

function Detail({inf,onUpdate,onDelete}){
  const [tab,setTab]=useState("pipeline");
  const [dmText,setDmText]=useState("");
  const [dmLoad,setDmLoad]=useState(false);
  const [dmErr,setDmErr]=useState("");
  const [notes,setNotes]=useState(inf.notes||"");
  const o=overall(inf);
  const stg=curStage(inf);
  function toggle(stepId){const steps={...(inf.steps||{})};steps[stepId]=!steps[stepId];onUpdate({steps});}
  async function genDM(){
    setDmLoad(true);setDmText("");setDmErr("");
    try{
      const t=await ai("Write 3 DMs for The Coffee Code (TCC).\nTCC: Alejandro sources specialty cherry near Canon de Taparto, Colombia. Processes at own wet mill, measures every variable, aims for perfection every lot. Roasts after ideal reposo. Arrives 7-10 days after roasting by plane. Double freshness: post-harvest plus post-roast. No US brand does both. Harvest and roast date on every bag.\n\nInfluencer: "+(inf.name||"@"+inf.handle)+" | Niche: "+(inf.niche||"coffee")+"\n\nNo emoji. No hashtags. Peer tone. First line specific to their content.\n\nDAY 1:\n[Opener. 3 sentences. Hook on their niche. Yes/no about free sample kit.]\n\nDAY 3:\n[No reply. 2 sentences. New angle. Gentle urgency.]\n\nDAY 7:\n[Final. 2 sentences. Scarcity. Last close.]\n",900);
      setDmText(t);
    }catch(e){setDmErr(e.message);}
    setDmLoad(false);
  }
  return <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
    <div style={{background:PAN,borderBottom:"1px solid "+BOR,padding:"10px 14px",flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
        <div>
          <div style={{fontSize:"16px",fontWeight:"bold",color:G}}>@{inf.handle||"?"}</div>
          {inf.name&&<div style={{fontSize:"10px",color:MUT,marginTop:"1px"}}>{inf.name}</div>}
        </div>
        <div style={{display:"flex",gap:"4px",flexWrap:"wrap",justifyContent:"flex-end",maxWidth:"58%"}}>
          {STATUSES.map(s=><button key={s.id} onClick={()=>onUpdate({status:s.id})} style={{...pill(inf.status===s.id,s.color,true)}}>{s.label}</button>)}
          <button onClick={onDelete} style={{...pill(false),color:"#ef444460",borderColor:"#ef444430",fontSize:"9px",padding:"2px 6px"}}>x</button>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:"9px",color:MUT,fontFamily:"monospace",marginBottom:"4px"}}>
        <span>{o}% complete</span>
        <span style={{color:stg.color}}>{stg.label}</span>
      </div>
      <Bar pct={o} color={stg.color} h={5}/>
    </div>
    <div style={{background:PAN,borderBottom:"1px solid "+BOR,display:"flex",paddingLeft:"10px",flexShrink:0}}>
      {[["pipeline","Pipeline"],["profile","Profile"],["notes","Notes"]].map(([id,label])=>
        <button key={id} onClick={()=>setTab(id)} style={{padding:"7px 12px",background:"transparent",border:"none",borderBottom:tab===id?"2px solid "+G:"2px solid transparent",color:tab===id?G:MUT,fontSize:"11px",cursor:"pointer"}}>{label}</button>
      )}
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"12px 14px"}}>
      {tab==="pipeline" && <>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"5px",marginBottom:"12px"}}>
          {STAGES.map(s=>{const p=pct(inf,s.id);return <div key={s.id} style={{background:CARD,border:"1px solid "+(p===100?s.color+"60":BOR),borderRadius:"3px",padding:"6px 8px",textAlign:"center"}}>
            <div style={{fontSize:"12px",fontWeight:"bold",fontFamily:"monospace",color:p===100?s.color:p>0?"#f59e0b":MUT}}>{p}%</div>
            <div style={{fontSize:"8px",color:MUT,marginTop:"1px"}}>{s.label}</div>
          </div>;})}
        </div>
        {STAGES.map(s=><Stage key={s.id} inf={inf} stage={s} onToggle={toggle} dmText={dmText} onGenDM={genDM} dmLoad={dmLoad} dmErr={dmErr}/>)}
      </>}
      {tab==="profile" && <div style={{display:"flex",flexDirection:"column",gap:"9px"}}>
        <div style={{background:CARD,border:"1px solid "+BOR,borderRadius:"4px",padding:"11px"}}>
          <div style={{fontSize:"8px",color:MUT,letterSpacing:"2px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"9px"}}>Details</div>
          {[["Handle","@"+(inf.handle||"?")],["Name",inf.name||"-"],["Niche",inf.niche||"-"],["Followers",inf.followers||"-"],["Engagement",inf.engagement||"-"],["Location",inf.location||"-"],["Fit Score",inf.fitScore?(inf.fitScore+"/10"):"-"]].map(([l,v])=>
            <div key={l} style={{display:"flex",gap:"8px",marginBottom:"6px",fontSize:"11px"}}>
              <span style={{color:DIM,fontFamily:"monospace",minWidth:"80px",flexShrink:0}}>{l}</span>
              <span style={{color:l==="Fit Score"?sc(parseInt(inf.fitScore)||0):TXT}}>{v}</span>
            </div>
          )}
        </div>
        {inf.fitReason&&<div style={{background:CARD,border:"1px solid "+BOR,borderRadius:"4px",padding:"11px"}}>
          <div style={{fontSize:"8px",color:MUT,letterSpacing:"2px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"7px"}}>TCC Fit</div>
          <div style={{fontSize:"11px",color:TXT,lineHeight:"1.7"}}>{inf.fitReason}</div>
          {inf.bestAngle&&<><div style={{fontSize:"8px",color:MUT,fontFamily:"monospace",marginTop:"8px",marginBottom:"3px"}}>BEST ANGLE</div><div style={{fontSize:"11px",color:TXT,lineHeight:"1.5"}}>{inf.bestAngle}</div></>}
        </div>}
      </div>}
      {tab==="notes" && <div>
        <div style={{fontSize:"9px",color:MUT,fontFamily:"monospace",marginBottom:"7px"}}>Shared with team - auto-saved</div>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} onBlur={()=>onUpdate({notes})}
          placeholder={"Notes for @"+inf.handle+"...\n\n- Replied? What did they say?\n- Shipping address?\n- Content angle that worked?"}
          style={{width:"100%",minHeight:"200px",padding:"10px",borderRadius:"4px",resize:"vertical",lineHeight:"1.7"}}/>
        {inf.addedDate&&<div style={{marginTop:"6px",fontSize:"9px",color:DIM,fontFamily:"monospace"}}>Added: {inf.addedDate}</div>}
      </div>}
    </div>
  </div>;
}

function AddModal({onAdd,onClose}){
  const [name,setName]=useState("");
  const [handle,setHandle]=useState("");
  const [niche,setNiche]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  async function submit(){
    const h=handle.trim().replace(/^@/,"");
    if(!h){setErr("Handle is required");return;}
    setLoading(true);setErr("");
    let aiData={};
    try{
      const raw=await ai("You are analyzing Instagram creator @"+h+" to decide if they are a good fit for The Coffee Code (TCC).\nTCC is a Colombian specialty espresso brand: Alejandro sources cherry near Canon de Taparto, processes at his own wet mill aiming for perfection in every lot, roasts after the ideal reposo period, and ships by plane arriving 7-10 days after roasting. Double freshness: post-harvest optimal conditions AND post-roast freshness. No US brand does both.\n\nBased on the handle @"+h+", make your best inference about this creator. If you recognize them, use real data. If not, make reasonable estimates based on what the handle suggests.\n\nRespond with ONLY a valid JSON object. No explanation. No markdown. Start with { and end with }.\nExample of good response:\n{\"niche\":\"Specialty Coffee\",\"followers\":\"50K-200K\",\"engagement\":\"3-5%\",\"location\":\"United States\",\"fitScore\":8,\"fitReason\":\"Coffee-focused creator with engaged specialty audience that would resonate with TCC farm-to-cup story.\",\"bestAngle\":\"Lead with the double freshness angle - harvest date AND roast date on every bag, something no US brand offers.\"}");
      aiData=exJSON(raw)||{};
    }catch(e){setErr("AI unavailable - profile saved, add details manually");}
    const inf={id:Date.now().toString(),name:name.trim(),handle:h,niche:niche.trim()||aiData.niche||"",followers:aiData.followers||"",engagement:aiData.engagement||"",location:aiData.location||"",fitScore:aiData.fitScore||5,fitReason:aiData.fitReason||"",bestAngle:aiData.bestAngle||"",status:"active",steps:{},notes:"",addedDate:tod()};
    onAdd(inf);setLoading(false);
  }
  return <div style={{position:"fixed",inset:0,background:"#000000b0",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:"20px"}}>
    <div style={{background:PAN,border:"1px solid "+BOR,borderRadius:"6px",padding:"20px",width:"100%",maxWidth:"400px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
        <div style={{fontSize:"13px",fontWeight:"bold",color:G,fontFamily:"monospace",letterSpacing:"1px"}}>ADD INFLUENCER</div>
        <button onClick={onClose} style={{background:"transparent",border:"none",color:MUT,fontSize:"18px",cursor:"pointer"}}>x</button>
      </div>
      {[["Instagram Handle",handle,setHandle,"tannercolsoncoffee"],["Full Name",name,setName,"Tanner Colson"],["Niche (optional)",niche,setNiche,"Specialty Coffee"]].map(([label,val,setter,ph])=>
        <div key={label} style={{marginBottom:"12px"}}>
          <div style={{fontSize:"9px",color:MUT,fontFamily:"monospace",letterSpacing:"1px",marginBottom:"5px"}}>{label.toUpperCase()}</div>
          <input value={val} onChange={e=>setter(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!loading&&submit()} placeholder={ph} style={{width:"100%"}}/>
        </div>
      )}
      {err&&<div style={{fontSize:"10px",color:"#f59e0b",marginBottom:"10px",fontFamily:"monospace"}}>{err}</div>}
      <div style={{display:"flex",gap:"8px"}}>
        <button onClick={submit} disabled={loading||!handle.trim()} style={{...btn(G),flex:1,opacity:loading||!handle.trim()?0.4:1}}>{loading?"Building AI profile...":"Add Influencer"}</button>
        <button onClick={onClose} style={btn(MUT)}>Cancel</button>
      </div>
      <div style={{marginTop:"10px",fontSize:"9px",color:DIM,fontFamily:"monospace"}}>AI auto-fills: niche, followers, fit score, best DM angle.</div>
    </div>
  </div>;
}

function App(){
  const [infs,setInfs]=useState([]);
  const [selId,setSelId]=useState(null);
  const [syncing,setSyncing]=useState(true);
  const [showAdd,setShowAdd]=useState(false);
  const [lastSync,setLastSync]=useState(null);
  const [filter,setFilter]=useState("all");
  async function load(){try{const rows=await dbLoad();setInfs(rows);setLastSync(new Date());setSyncing(false);}catch(e){setSyncing(false);}}
  useEffect(()=>{load();},[]);
  useEffect(()=>{
    const ch=SB.channel("crm").on("postgres_changes",{event:"*",schema:"public",table:"influencers"},()=>load()).subscribe();
    return()=>SB.removeChannel(ch);
  },[]);
  useEffect(()=>{if(selId){const f=infs.find(i=>i.id===selId);if(!f)setSelId(null);}},[infs]);
  const sel=infs.find(i=>i.id===selId)||(infs.length>0?infs[0]:null);
  function update(id,patch){setInfs(p=>p.map(i=>{if(i.id!==id)return i;const u={...i,...patch};dbSave(u);return u;}));}
  function add(inf){setInfs(p=>[inf,...p]);dbSave(inf);setSelId(inf.id);setShowAdd(false);}
  function del(inf){dbDel(inf.handle||inf._h);setInfs(p=>p.filter(i=>i.id!==inf.id));setSelId(null);}
  const due=infs.filter(i=>i.status==="active"&&overall(i)<100).length;
  const conv=infs.filter(i=>i.status==="converting").length;
  const filt=infs.filter(i=>filter==="all"||i.status===filter);
  return <div style={{height:"100vh",background:BG,color:TXT,display:"flex",flexDirection:"column",overflow:"hidden",fontFamily:"Georgia,serif",fontSize:"13px"}}>
    <div style={{background:PAN,borderBottom:"1px solid "+BOR,padding:"10px 16px",display:"flex",alignItems:"center",gap:"12px",flexShrink:0}}>
      <div><div style={{fontSize:"8px",letterSpacing:"3px",color:MUT,fontFamily:"monospace",textTransform:"uppercase"}}>THE COFFEE CODE</div><div style={{fontSize:"15px",fontWeight:"bold",color:G}}>Influencer CRM</div></div>
      <div style={{flex:1}}/>
      <span style={{fontSize:"9px",fontFamily:"monospace",color:syncing?"#f59e0b":"#10b981"}}>{syncing?"syncing...":"live"}{lastSync&&!syncing&&<span style={{color:DIM,marginLeft:5}}>{lastSync.toLocaleTimeString()}</span>}</span>
      {[["Total",infs.length,TXT],["Active",due,"#f59e0b"],["Converting",conv,"#10b981"]].map(([l,v,c])=>
        <div key={l} style={{textAlign:"center",minWidth:"38px"}}><div style={{fontSize:"14px",fontWeight:"bold",fontFamily:"monospace",color:c,lineHeight:1}}>{v}</div><div style={{fontSize:"8px",color:DIM,fontFamily:"monospace"}}>{l}</div></div>
      )}
      <button onClick={()=>setShowAdd(true)} style={{...btn(G),padding:"5px 12px",fontSize:"11px"}}>+ Add</button>
    </div>
    <div style={{display:"flex",flex:1,overflow:"hidden",minHeight:0}}>
      <div style={{width:"215px",borderRight:"1px solid "+BOR,display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"7px 8px",borderBottom:"1px solid "+DIM,display:"flex",gap:"3px",flexWrap:"wrap",flexShrink:0}}>
          <button onClick={()=>setFilter("all")} style={{...pill(filter==="all",G,true)}}>All {infs.length}</button>
          {STATUSES.map(s=>{const n=infs.filter(i=>i.status===s.id).length;return n?<button key={s.id} onClick={()=>setFilter(s.id)} style={{...pill(filter===s.id,s.color,true)}}>{s.label} {n}</button>:null;})}
        </div>
        <div style={{flex:1,overflowY:"auto"}}>
          {filt.length===0&&<div style={{padding:"24px 12px",textAlign:"center",color:DIM,fontSize:"11px",lineHeight:2.2}}><div style={{fontSize:"20px",opacity:.1,marginBottom:"6px"}}>@</div>No influencers yet.<br/>Tap + Add to start.</div>}
          {filt.map(inf=>{
            const p=overall(inf);const stg=curStage(inf);const stat=STATUSES.find(s=>s.id===inf.status)||STATUSES[0];const isSel=sel&&sel.id===inf.id;
            return <div key={inf.id||inf._h} onClick={()=>setSelId(inf.id||inf._h)} style={{padding:"9px 10px",borderBottom:"1px solid "+DIM,cursor:"pointer",background:isSel?"#161108":"transparent",borderLeft:isSel?"3px solid "+G:"3px solid transparent"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"2px"}}>
                <div style={{color:G,fontSize:"12px",fontWeight:"bold",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"130px"}}>@{inf.handle||"?"}</div>
                <span style={{fontSize:"9px",color:stat.color,fontFamily:"monospace"}}>{p}%</span>
              </div>
              {inf.name&&<div style={{fontSize:"10px",color:MUT,marginBottom:"3px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inf.name}</div>}
              <Bar pct={p} color={stg.color} h={3} style={{marginBottom:"4px"}}/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:"9px",background:stg.color+"20",color:stg.color,border:"1px solid "+stg.color+"40",padding:"1px 5px",borderRadius:"10px",fontFamily:"monospace"}}>{stg.label}</span>
                <span style={{fontSize:"9px",color:stat.color,fontFamily:"monospace"}}>{stat.label}</span>
              </div>
            </div>;
          })}
        </div>
      </div>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {!sel
          ?<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"10px",color:DIM}}>
            <div style={{fontSize:"30px",opacity:.1}}>@</div>
            <div style={{fontFamily:"monospace",fontSize:"11px",textAlign:"center",lineHeight:2}}>Add an influencer to start.<br/><span style={{color:"#10b981",fontSize:"10px"}}>Syncs live with your team.</span></div>
            <button onClick={()=>setShowAdd(true)} style={btn(G)}>+ Add Influencer</button>
          </div>
          :<Detail inf={sel} onUpdate={patch=>update(sel.id||sel._h,patch)} onDelete={()=>del(sel)}/>
        }
      </div>
    </div>
    {showAdd&&<AddModal onAdd={add} onClose={()=>setShowAdd(false)}/>}
  </div>;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
