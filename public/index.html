const TOTAL=STAGES.reduce((a,s)=>a+s.steps.length,0);
const tod=()=>new Date().toISOString().split("T")[0];
const sc=n=>n>=8?"#0d7a5f":n>=6?"#a0722a":n>=4?"#c4621a":"#c0392b";
function pct(inf,sid){const s=STAGES.find(x=>x.id===sid);if(!s)return 0;return Math.round(s.steps.filter(x=>(inf.steps||{})[x.id]).length/s.steps.length*100);}
function overall(inf){return Math.round(Object.values(inf.steps||{}).filter(Boolean).length/TOTAL*100);}
function curStage(inf){for(let i=STAGES.length-1;i>=0;i--){if(pct(inf,STAGES[i].id)>0)return STAGES[i];}return STAGES[0];}
function exJSON(t){if(!t)return null;let s=t.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();try{return JSON.parse(s)}catch(e){}const i=s.indexOf("{"),j=s.lastIndexOf("}");if(i!==-1&&j>i){try{return JSON.parse(s.slice(i,j+1))}catch(e){}}return null;}
async function ai(content,max){
  max=max||1200;
  const r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,messages:[{role:"user",content}]})});
  if(!r.ok)throw new Error("API "+r.status);
  const d=await r.json();return(d.content&&d.content[0]&&d.content[0].text)||"";
}
async function dbLoad(){const{data,error}=await SB.from("influencers").select("*").order("id",{ascending:false});if(error)throw error;return(data||[]).map(r=>({...r.data,_h:r.handle}));}
async function dbSave(inf){const{_h,...data}=inf;const handle=inf.handle||_h;await SB.from("influencers").upsert({handle,data,updated_at:new Date().toISOString()},{onConflict:"handle"});}
async function dbDel(h){await SB.from("influencers").delete().eq("handle",h);}

// Migrate old contacts — assign account=alejandro if missing
async function migrateContacts(){
  const{data}=await SB.from("influencers").select("*");
  if(!data)return;
  const toFix=data.filter(r=>!r.data?.account);
  for(const row of toFix){
    const updated={...row.data,account:"alejandro"};
    await SB.from("influencers").update({data:updated,updated_at:new Date().toISOString()}).eq("handle",row.handle);
  }
  return toFix.length;
}

const pill=(on,col,sm)=>{col=col||G;sm=sm||false;return{padding:sm?"2px 7px":"3px 9px",background:on?col+"18":"transparent",border:"1px solid "+(on?col:BOR),color:on?col:MUT,fontFamily:"monospace",fontSize:sm?"9px":"10px",borderRadius:"2px",cursor:"pointer"};};

function Bar({pct:p,color,h,style}){
  color=color||G;h=h||4;style=style||{};
  return <div style={{height:h,background:BOR,borderRadius:"2px",overflow:"hidden",...style}}>
    <div style={{height:"100%",width:p+"%",background:color,transition:"width .3s"}}/>
  </div>;
}

function Stage({inf,stage,onToggle,dmText,onGenDM,dmLoad,dmErr}){
  const [open,setOpen]=useState(false);
  const p=pct(inf,stage.id);
  const done=stage.steps.filter(s=>(inf.steps||{})[s.id]).length;
  return <div style={{border:"1px solid "+BOR,borderRadius:"6px",marginBottom:"8px",overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
    <div onClick={()=>setOpen(v=>!v)} style={{padding:"10px 14px",background:PAN,cursor:"pointer",display:"flex",alignItems:"center",gap:"10px"}}>
      <div style={{width:"8px",height:"8px",borderRadius:"50%",background:stage.color,flexShrink:0}}/>
      <div style={{flex:1}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}>
          <span style={{fontSize:"12px",fontWeight:"bold",color:p===100?stage.color:TXT}}>{stage.label}</span>
          <span style={{fontSize:"10px",fontFamily:"monospace",color:p===100?stage.color:MUT}}>{done}/{stage.steps.length}{p===100?" ✓":""}</span>
        </div>
        <Bar pct={p} color={stage.color} h={4}/>
      </div>
      <span style={{color:MUT,fontSize:"12px"}}>{open?"▲":"▼"}</span>
    </div>
    {open&&<div style={{padding:"12px 14px",background:CARD,borderTop:"1px solid "+BOR}}>
      {stage.steps.map(step=>{
        const checked=!!(inf.steps||{})[step.id];
        return <div key={step.id} onClick={()=>onToggle(step.id)} style={{display:"flex",gap:"10px",marginBottom:"8px",cursor:"pointer",alignItems:"flex-start"}}>
          <div style={{width:"16px",height:"16px",borderRadius:"4px",flexShrink:0,marginTop:"1px",border:"2px solid "+(checked?stage.color:BOR),background:checked?stage.color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 1px 2px rgba(0,0,0,0.1)"}}>
            {checked&&<span style={{color:"#fff",fontSize:"10px",fontWeight:"bold"}}>✓</span>}
          </div>
          <span style={{fontSize:"12px",color:checked?DIM:TXT,textDecoration:checked?"line-through":"none",lineHeight:"1.5"}}>{step.label}</span>
        </div>;
      })}
      {stage.id==="outreach"&&<div style={{marginTop:"12px",borderTop:"1px solid "+BOR,paddingTop:"12px"}}>
        <button onClick={onGenDM} disabled={dmLoad} style={{...btn(G),width:"100%",marginBottom:"10px",padding:"9px"}}>{dmLoad?"Generating...":"Generate Day 1 / Day 3 / Day 7 DMs"}</button>
        {dmErr&&<div style={{fontSize:"11px",color:RED,marginBottom:"8px",fontFamily:"monospace"}}>{dmErr}</div>}
        {dmText&&<div style={{background:"#fff",border:"1px solid "+BOR,borderRadius:"4px",padding:"14px"}}>
          {dmText.split("\n").map((line,i)=>{
            const isH=/^(DAY 1|DAY 3|DAY 7):/.test(line);
            return <div key={i} style={{color:isH?G:TXT,fontStyle:isH?"normal":"italic",fontWeight:isH?"bold":"normal",marginTop:isH&&i>0?"14px":"0",fontSize:isH?"9px":"12px",letterSpacing:isH?"1.5px":"0",lineHeight:"1.8",fontFamily:isH?"monospace":"Georgia,serif"}}>{line}</div>;
          })}
        </div>}
      </div>}
    </div>}
  </div>;
}

      {tab==="profile"&&<div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
        <div style={{fontSize:"10px",color:MUT,fontFamily:"monospace"}}>All fields editable — tap a field, type, tap away to save</div>
        <div style={{background:PAN,border:"1px solid "+BOR,borderRadius:"6px",padding:"14px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:"9px",color:MUT,letterSpacing:"2px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"12px"}}>Profile Details</div>

function AddModal({onAdd,onClose,allHandles}){
  allHandles=allHandles||[];
  const [name,setName]=useState("");
  const [handle,setHandle]=useState("");
  const [niche,setNiche]=useState("");
  const [acct,setAcct]=useState("alejandro");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  async function submit(){
    const h=handle.trim().replace(/^@/,"");
    if(!h){setErr("Handle is required");return;}
    if(allHandles.indexOf(h.toLowerCase())!==-1){setErr("@"+h+" already exists in the CRM");return;}
    setLoading(true);setErr("");
    let aiData={};
    try{
      const raw=await ai("Analyze Instagram @"+h+" for The Coffee Code (TCC) specialty espresso brand.\nTCC sources cherry near Canon de Taparto, processes at own wet mill aiming for perfection, roasts after ideal reposo, ships 7-10 days after roasting. Double freshness angle.\nUse real data if you know this creator. Otherwise estimate from the handle.\nReturn ONLY JSON, start { end }:\n{\"niche\":\"niche\",\"followers\":\"range\",\"engagement\":\"%\",\"location\":\"US location\",\"fitScore\":7,\"fitReason\":\"2 sentences\",\"bestAngle\":\"DM hook\"}");
      aiData=exJSON(raw)||{};
    }catch(e){setErr("AI unavailable - profile saved, fill details manually");}
    const inf={id:Date.now().toString(),name:name.trim(),handle:h,account:acct,niche:niche.trim()||aiData.niche||"",followers:aiData.followers||"",engagement:aiData.engagement||"",location:aiData.location||"",fitScore:aiData.fitScore||5,fitReason:aiData.fitReason||"",bestAngle:aiData.bestAngle||"",status:"active",steps:{},notes:"",addedDate:tod()};
    onAdd(inf);setLoading(false);
  }
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:"20px"}}>
    <div style={{background:PAN,border:"1px solid "+BOR,borderRadius:"10px",padding:"22px",width:"100%",maxWidth:"400px",boxShadow:"0 8px 32px rgba(0,0,0,0.15)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
        <div style={{fontSize:"14px",fontWeight:"bold",color:TXT}}>Add Influencer</div>
        <button onClick={onClose} style={{background:"transparent",border:"none",color:MUT,fontSize:"20px",cursor:"pointer",lineHeight:1}}>×</button>
      </div>
      <div style={{marginBottom:"16px"}}>
        <div style={{fontSize:"10px",color:MUT,fontFamily:"monospace",letterSpacing:"1px",marginBottom:"7px"}}>ASSIGN TO ACCOUNT</div>
        <div style={{display:"flex",gap:"6px"}}>
          {ACCOUNTS.map(a=><button key={a.id} onClick={()=>setAcct(a.id)} style={{flex:1,padding:"7px 4px",background:acct===a.id?a.color:"#f4f0ea",border:"1px solid "+(acct===a.id?a.color:BOR),color:acct===a.id?"#fff":MUT,fontFamily:"monospace",fontSize:"10px",borderRadius:"4px",cursor:"pointer"}}>{a.label}</button>)}
        </div>
      </div>
      {[["Instagram Handle",handle,setHandle,"tannercolsoncoffee"],["Full Name",name,setName,"Tanner Colson"],["Niche (optional)",niche,setNiche,"Specialty Coffee"]].map(([label,val,setter,ph])=>
        <div key={label} style={{marginBottom:"12px"}}>
          <div style={{fontSize:"10px",color:MUT,fontFamily:"monospace",letterSpacing:"1px",marginBottom:"5px"}}>{label.toUpperCase()}</div>
          <input value={val} onChange={e=>setter(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!loading&&submit()} placeholder={ph} style={{width:"100%"}}/>
        </div>
      )}
      {err&&<div style={{fontSize:"11px",color:RED,marginBottom:"10px",background:"#fef2f2",border:"1px solid #fecaca",padding:"8px 10px",borderRadius:"4px"}}>{err}</div>}
      <div style={{display:"flex",gap:"8px"}}>
        <button onClick={submit} disabled={loading||!handle.trim()} style={{...btn(G),flex:1,padding:"9px",opacity:loading||!handle.trim()?0.5:1}}>{loading?"Building AI profile...":"Add Influencer"}</button>
        <button onClick={onClose} style={{...btnO(MUT),padding:"9px 16px"}}>Cancel</button>
      </div>
      <div style={{marginTop:"10px",fontSize:"10px",color:DIM,fontFamily:"monospace"}}>AI auto-fills niche, followers, fit score, best angle.</div>
    </div>
  </div>;
}

function App(){
  const [infs,setInfs]=useState([]);
  const [selId,setSelId]=useState(null);
  const [syncing,setSyncing]=useState(true);
  const [showAdd,setShowAdd]=useState(false);
  const [lastSync,setLastSync]=useState(null);
  const [filter,setFilter]=useState("all");
  const [acctTab,setAcctTab]=useState("alejandro");

  async function load(){
    try{const rows=await dbLoad();setInfs(rows);setLastSync(new Date());setSyncing(false);}
    catch(e){setSyncing(false);}
  }

  useEffect(()=>{
    // Load then migrate old contacts to alejandro
    dbLoad().then(async rows=>{
      const needsMigration=rows.filter(r=>!r.account);
      if(needsMigration.length>0){
        await migrateContacts();
        const fresh=await dbLoad();
        setInfs(fresh);
      } else {
        setInfs(rows);
      }
      setLastSync(new Date());
      setSyncing(false);
    }).catch(()=>setSyncing(false));
  },[]);

  useEffect(()=>{
    const ch=SB.channel("crm").on("postgres_changes",{event:"*",schema:"public",table:"influencers"},()=>load()).subscribe();
    return()=>SB.removeChannel(ch);
  },[]);

  const acctInfs=infs.filter(i=>(i.account||"alejandro")===acctTab);
  const sel=acctInfs.find(i=>i.id===selId)||(acctInfs.length>0?acctInfs[0]:null);
  const filt=acctInfs.filter(i=>filter==="all"||i.status===filter);
  const due=acctInfs.filter(i=>i.status==="active"&&overall(i)<100).length;
  const conv=acctInfs.filter(i=>i.status==="converting").length;
  const allHandles=infs.map(i=>(i.handle||"").toLowerCase());

  function update(id,patch){setInfs(p=>p.map(i=>{if(i.id!==id)return i;const u={...i,...patch};dbSave(u);return u;}));}
  function add(inf){setInfs(p=>[inf,...p]);dbSave(inf);setSelId(inf.id);setShowAdd(false);}
  function del(inf){dbDel(inf.handle||inf._h);setInfs(p=>p.filter(i=>i.id!==inf.id));setSelId(null);}

  return <div style={{height:"100vh",background:BG,color:TXT,display:"flex",flexDirection:"column",overflow:"hidden",fontFamily:"Georgia,serif",fontSize:"13px"}}>

    {/* HEADER */}
    <div style={{background:PAN,borderBottom:"1px solid "+BOR,padding:"10px 18px",display:"flex",alignItems:"center",gap:"14px",flexShrink:0,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
      <div>
        <div style={{fontSize:"8px",letterSpacing:"3px",color:DIM,fontFamily:"monospace",textTransform:"uppercase"}}>THE COFFEE CODE</div>
        <div style={{fontSize:"16px",fontWeight:"bold",color:G}}>Influencer CRM</div>
      </div>
      <div style={{flex:1}}/>
      <span style={{fontSize:"9px",fontFamily:"monospace",color:syncing?"#c4621a":"#0d7a5f",display:"flex",alignItems:"center",gap:"4px"}}>
        <span style={{width:"6px",height:"6px",borderRadius:"50%",background:syncing?"#c4621a":"#0d7a5f",display:"inline-block"}}/>
        {syncing?"syncing...":"live"}
        {lastSync&&!syncing&&<span style={{color:DIM,marginLeft:4}}>{lastSync.toLocaleTimeString()}</span>}
      </span>
      {[["Total",acctInfs.length,TXT],["Active",due,ORG],["Converting",conv,ACT]].map(([l,v,c])=>
        <div key={l} style={{textAlign:"center",minWidth:"42px"}}>
          <div style={{fontSize:"16px",fontWeight:"bold",fontFamily:"monospace",color:c,lineHeight:1}}>{v}</div>
          <div style={{fontSize:"8px",color:DIM,fontFamily:"monospace",marginTop:"2px"}}>{l}</div>
        </div>
      )}
      <button onClick={()=>setShowAdd(true)} style={{...btn(G),padding:"7px 14px",fontSize:"12px",borderRadius:"6px"}}>+ Add</button>
    </div>

    {/* ACCOUNT TABS */}
    <div style={{background:PAN,borderBottom:"1px solid "+BOR,display:"flex",flexShrink:0}}>
      {ACCOUNTS.map(a=>{
        const n=infs.filter(i=>(i.account||"alejandro")===a.id).length;
        return <button key={a.id} onClick={()=>{setAcctTab(a.id);setSelId(null);setFilter("all");}}
          style={{padding:"10px 18px",background:"transparent",border:"none",borderBottom:acctTab===a.id?"3px solid "+a.color:"3px solid transparent",color:acctTab===a.id?a.color:MUT,fontSize:"12px",cursor:"pointer",fontFamily:"monospace",fontWeight:acctTab===a.id?"bold":"normal",display:"flex",alignItems:"center",gap:"7px"}}>
          {a.label}
          <span style={{fontSize:"10px",background:a.color+"15",color:a.color,border:"1px solid "+a.color+"40",padding:"1px 7px",borderRadius:"10px"}}>{n}</span>
        </button>;
      })}
    </div>

    <div style={{display:"flex",flex:1,overflow:"hidden",minHeight:0}}>

      {/* SIDEBAR */}
      <div style={{width:"220px",borderRight:"1px solid "+BOR,display:"flex",flexDirection:"column",flexShrink:0,background:PAN}}>
        <div style={{padding:"8px",borderBottom:"1px solid "+BOR,display:"flex",gap:"3px",flexWrap:"wrap",flexShrink:0}}>
          <button onClick={()=>setFilter("all")} style={{...pill(filter==="all",G,true)}}>All {acctInfs.length}</button>
          {STATUSES.map(s=>{const n=acctInfs.filter(i=>i.status===s.id).length;return n?<button key={s.id} onClick={()=>setFilter(s.id)} style={{...pill(filter===s.id,s.color,true)}}>{s.label} {n}</button>:null;})}
        </div>
        <div style={{flex:1,overflowY:"auto"}}>
          {filt.length===0&&<div style={{padding:"28px 14px",textAlign:"center",color:DIM,fontSize:"11px",lineHeight:2.2}}>
            <div style={{fontSize:"24px",marginBottom:"8px",opacity:.3}}>@</div>
            No influencers in<br/><strong>{(ACCOUNTS.find(a=>a.id===acctTab)||{}).label}</strong> yet.<br/>Tap + Add to start.
          </div>}
          {filt.map(inf=>{
            const p=overall(inf);const stg=curStage(inf);const stat=STATUSES.find(s=>s.id===inf.status)||STATUSES[0];const isSel=sel&&sel.id===inf.id;
            return <div key={inf.id||inf._h} onClick={()=>setSelId(inf.id||inf._h)} style={{padding:"10px 12px",borderBottom:"1px solid "+BOR,cursor:"pointer",background:isSel?"#fdf8f0":"#fff",borderLeft:isSel?"3px solid "+G:"3px solid transparent",transition:"background .1s"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"3px"}}>
                <div style={{color:isSel?G:TXT,fontSize:"13px",fontWeight:"bold",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"140px"}}>
                  <a href={"https://instagram.com/"+(inf.handle||"")} target="_blank" onClick={e=>e.stopPropagation()} style={{color:"inherit",textDecoration:"none"}}>@{inf.handle||"?"}</a>
                </div>
                <span style={{fontSize:"10px",color:stat.color,fontFamily:"monospace",fontWeight:"bold"}}>{p}%</span>
              </div>
              {inf.name&&<div style={{fontSize:"10px",color:MUT,marginBottom:"4px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inf.name}</div>}
              <Bar pct={p} color={stg.color} h={3} style={{marginBottom:"5px"}}/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:"9px",background:stg.color+"15",color:stg.color,border:"1px solid "+stg.color+"40",padding:"2px 7px",borderRadius:"10px",fontFamily:"monospace"}}>{stg.label}</span>
                <span style={{fontSize:"9px",color:stat.color,fontFamily:"monospace"}}>{stat.label}</span>
              </div>
            </div>;
          })}
        </div>
      </div>

      {/* DETAIL */}
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",background:BG}}>
        {!sel
          ?<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"12px",color:DIM}}>
            <div style={{fontSize:"40px",opacity:.15}}>@</div>
            <div style={{fontFamily:"monospace",fontSize:"12px",textAlign:"center",lineHeight:2,color:MUT}}>
              Add an influencer to start.<br/>
              <span style={{color:ACT,fontSize:"11px"}}>● Syncs live with your team.</span>
            </div>
            <button onClick={()=>setShowAdd(true)} style={{...btn(G),padding:"10px 20px",fontSize:"12px",borderRadius:"6px"}}>+ Add Influencer</button>
          </div>
          :<Detail inf={sel} onUpdate={patch=>update(sel.id||sel._h,patch)} onDelete={()=>del(sel)}/>
        }
      </div>
    </div>

    {showAdd&&<AddModal onAdd={add} onClose={()=>setShowAdd(false)} allHandles={allHandles}/>}
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
