async function callClaude(content,maxTokens=1200){
  const r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages:[{role:"user",content}]})});
  if(!r.ok){const e=await r.text().catch(()=>r.statusText);throw new Error("API "+r.status+": "+e.slice(0,200));}
  const d=await r.json();return(d.content&&d.content[0]&&d.content[0].text)||"";
}

  return(

            <div style={{background:CARD,border:"1px solid "+BOR,borderRadius:"4px",padding:"10px"}}><div style={{fontSize:"8px",color:MUT,letterSpacing:"2px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"7px"}}>TCC Fit</div><div style={{fontSize:"11px",color:TXT,lineHeight:"1.7",marginBottom:"7px"}}>{sel.tccFitReason}</div>{sel.redFlags&&sel.redFlags!=="None"&&<div style={{fontSize:"10px",color:"#ef4444",background:"#ef444410",border:"1px solid #ef444430",padding:"4px 7px",borderRadius:"3px"}}>{sel.redFlags}</div>}</div>
            <div style={{background:CARD,border:"1px solid "+BOR,borderRadius:"4px",padding:"10px"}}><div style={{fontSize:"8px",color:MUT,letterSpacing:"2px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"7px"}}>Strategy</div>{[["Best Angle",sel.bestAngle],["DM Timing",sel.dmTiming],["Sample",sel.sampleStrategy],["Action",sel.recommendedFirstAction]].filter(([,v])=>v).map(([l,v])=><div key={l} style={{marginBottom:"7px"}}><div style={{fontSize:"8px",color:MUT,fontFamily:"monospace",marginBottom:"2px"}}>{l.toUpperCase()}</div><div style={{fontSize:"11px",color:TXT,lineHeight:"1.5"}}>{v}</div></div>)}</div>
            <div style={{background:CARD,border:"1px solid "+BOR,borderRadius:"4px",padding:"10px"}}><div style={{fontSize:"8px",color:MUT,letterSpacing:"2px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"7px"}}>Audience</div>{sel.contentStyle&&<div style={{fontSize:"11px",color:TXT,lineHeight:"1.6",marginBottom:"7px"}}>{sel.contentStyle}</div>}{sel.audienceProfile&&<div style={{fontSize:"11px",color:MUT,lineHeight:"1.6"}}>{sel.audienceProfile}</div>}</div>
            <div style={{gridColumn:"1/-1",background:"#18120010",border:"1px solid #3a2810",borderRadius:"4px",padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:"8px",color:MUT,fontFamily:"monospace",letterSpacing:"2px"}}>NEXT ACTION</div><div style={{fontSize:"12px",color:UC[nextAct(sel).urg],marginTop:"2px",fontWeight:"bold"}}>{nextAct(sel).lbl}</div></div><button onClick={()=>setTab("actions")} style={{...pill(true,G),padding:"4px 10px"}}>Checklist</button></div>
          </div>}
          {tab==="actions"&&<div>
            <div style={{marginBottom:"12px"}}><div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",color:MUT,fontFamily:"monospace",marginBottom:"4px"}}><span>Progress</span><span>{Object.values(sel.actions||{}).filter(Boolean).length}/{ACTIONS.length}</span></div><div style={{height:"3px",background:BOR,borderRadius:"2px",overflow:"hidden"}}><div style={{height:"100%",background:G,transition:"width .3s",width:(Object.values(sel.actions||{}).filter(Boolean).length/ACTIONS.length*100)+"%"}}/></div></div>
            <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
              {ACTIONS.map(action=>{const checked=!!(sel.actions||{})[action.id];const na=nextAct(sel);const isNext=na.id===action.id;return(
                <div key={action.id} style={{background:checked?"#10b98108":isNext?"#c9943a15":CARD,border:"1px solid "+(checked?"#10b98130":isNext?"#c9943a50":BOR),borderRadius:"3px",padding:"8px 10px",display:"flex",alignItems:"center",gap:"9px"}}>
                  <div onClick={()=>tickAction(sel.handle,action.id)} style={{width:"16px",height:"16px",borderRadius:"3px",flexShrink:0,border:"2px solid "+(checked?"#10b981":isNext?G:BOR),background:checked?"#10b981":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{checked&&<span style={{color:"#000",fontSize:"10px",fontWeight:"bold"}}>✓</span>}</div>
                  <div style={{flex:1}}><div style={{fontSize:"11px",color:checked?MUT:isNext?G:TXT,textDecoration:checked?"line-through":"none"}}>{action.label}</div>{action.adv&&<div style={{fontSize:"9px",color:DIM,fontFamily:"monospace",marginTop:"1px"}}>{gs(action.adv).label}</div>}</div>
                  {isNext&&!checked&&<div style={{fontSize:"9px",color:G,fontFamily:"monospace",background:"#c9943a15",border:"1px solid #c9943a40",padding:"2px 5px",borderRadius:"10px"}}>now</div>}
                  {action.id==="first_contact"&&sel.dmDate&&checked&&<div style={{fontSize:"9px",color:DIM,fontFamily:"monospace"}}>{sel.dmDate}</div>}
                  {action.id==="sample_shipped"&&sel.sampleDate&&checked&&<div style={{fontSize:"9px",color:DIM,fontFamily:"monospace"}}>{sel.sampleDate}</div>}
                </div>);})}
            </div>
          </div>}
          {tab==="dm"&&<div>
            <div style={{display:"flex",gap:"9px",alignItems:"center",marginBottom:"11px"}}><button onClick={()=>genDM(sel)} disabled={dmLoad} style={{...pill(true,G),padding:"7px 16px",fontSize:"12px"}}>{dmLoad?"Generating...":"Generate DMs"}</button><span style={{fontSize:"9px",color:DIM,fontFamily:"monospace"}}>Opener · Follow-up · Sample Pitch</span></div>
            {dmErr&&<div style={{marginBottom:"9px",fontSize:"11px",color:"#ef4444",fontFamily:"monospace"}}>{dmErr}</div>}
            {dmText?<div style={{background:CARD,border:"1px solid "+BOR,borderRadius:"4px",padding:"12px"}}>{dmText.split("\n").map((line,i)=>{const isH=/^(OPENER|FOLLOW-UP|SAMPLE PITCH):/.test(line);return<div key={i} style={{color:isH?G:TXT,fontStyle:isH?"normal":"italic",fontWeight:isH?"bold":"normal",marginTop:(isH&&i>0)?"12px":"0",fontFamily:isH?"monospace":"inherit",fontSize:isH?"8px":"12px",letterSpacing:isH?"1.5px":"0",lineHeight:"1.8"}}>{line}</div>;})}</div>
            :<div style={{background:CARD,border:"1px solid "+BOR,borderRadius:"4px",padding:"18px",textAlign:"center",color:DIM,fontSize:"11px"}}>Tap Generate to create personalized DMs for {sel.handle}.</div>}
          </div>}
          {tab==="notes"&&<div>
            <div style={{fontSize:"9px",color:MUT,fontFamily:"monospace",marginBottom:"6px"}}>Shared with team · auto-saved</div>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} onBlur={()=>pushUpdate(sel.handle,{notes})} placeholder={"Notes for "+sel.handle+"...\n\n- What did they reply?\n- Personal details for next DM?\n- Which sample angle worked?"} style={{width:"100%",minHeight:"160px",padding:"10px",borderRadius:"4px",resize:"vertical",lineHeight:"1.7"}}/>
            <div style={{marginTop:"7px",fontSize:"9px",color:DIM,fontFamily:"monospace"}}>Added: {sel.addedDate}</div>
          </div>}
        </div>
      </React.Fragment>}
    </div>
  </div>
</div>);
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
