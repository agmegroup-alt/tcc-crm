function stageProgress(inf,stageId){
const stage=STAGES.find(s=>s.id===stageId);
if(!stage)return 0;
const done=stage.steps.filter(st=>(inf.steps||{})[st.id]).length;
return Math.round(done/stage.steps.length*100);
}
function overallProgress(inf){
const done=Object.values(inf.steps||{}).filter(Boolean).length;
return Math.round(done/TOTAL_STEPS*100);
}
function currentStage(inf){
for(let i=STAGES.length-1;i>=0;i–){
const p=stageProgress(inf,STAGES[i].id);
if(p>0)return STAGES[i];
}
return STAGES[0];
}

async function callClaude(content,maxTokens=1200){
const r=await fetch(”/api/claude”,{method:“POST”,headers:{“Content-Type”:“application/json”},body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:maxTokens,messages:[{role:“user”,content}]})});
if(!r.ok){const e=await r.text().catch(()=>r.statusText);throw new Error(“API “+r.status+”: “+e.slice(0,200));}
const d=await r.json();return(d.content&&d.content[0]&&d.content[0].text)||””;
}

function App(){
const sb=supabase.createClient(SB_URL,SB_KEY);
const[infs,setInfs]=useState([]);
const[selId,setSelId]=useState(null);
const[syncing,setSyncing]=useState(true);
const[showAdd,setShowAdd]=useState(false);
const[lastSync,setLastSync]=useState(null);
const[filter,setFilter]=useState(“all”);

async function dbLoad(){
const res=await sb.from(“influencers”).select(”*”).order(“id”,{ascending:false});
if(res.error)throw res.error;
return(res.data||[]).map(r=>({…r.data,_dbHandle:r.handle}));
}
async function dbSave(inf){
const handle=inf.handle||inf._dbHandle;
const{_dbHandle,…data}=inf;
await sb.from(“influencers”).upsert({handle,data,updated_at:new Date().toISOString()},{onConflict:“handle”});
}
async function dbDel(handle){await sb.from(“influencers”).delete().eq(“handle”,handle);}

useEffect(()=>{
setSyncing(true);
dbLoad().then(rows=>{setInfs(rows);setSyncing(false);setLastSync(new Date());}).catch(()=>setSyncing(false));
},[]);

useEffect(()=>{
const ch=sb.channel(“crm2”).on(“postgres_changes”,{event:”*”,schema:“public”,table:“influencers”},()=>{
dbLoad().then(rows=>{setInfs(rows);setLastSync(new Date());});
}).subscribe();
return()=>sb.removeChannel(ch);
},[]);
