function log(msg, cls) {
  const d = document.getElementById("log");
  const line = document.createElement("div");
  line.className = cls||"";
  line.textContent = msg;
  d.appendChild(line);
  window.scrollTo(0, document.body.scrollHeight);
}

async function runImport() {
  const btn = document.getElementById("btn");
  btn.disabled = true;
  btn.textContent = "Importing...";
  document.getElementById("log").innerHTML = "";

  const {data:existing} = await SB.from("influencers").select("handle");
  const existingHandles = new Set((existing||[]).map(r=>r.handle.toLowerCase()));
  log(`Found ${existingHandles.size} existing contacts — skipping duplicates`, "dim");
  log("", "");

  let added=0, skipped=0;
  const today = new Date().toISOString().split("T")[0];

  for (const c of CONTACTS) {
    if (existingHandles.has(c.handle.toLowerCase())) {
      log("skip  @"+c.handle, "dim");
      skipped++;
      continue;
    }
    const inf = {
      id: Date.now().toString()+Math.random().toString(36).slice(2,5),
      name: c.name,
      handle: c.handle,
      account: "alejandro",
      niche: c.niche,
      followers: c.followers,
      engagement: "",
      email: c.email,
      location: c.location,
      fitScore: c.fitScore,
      fitReason: "",
      bestAngle: "",
      status: "active",
      steps: {},
      notes: "",
      addedDate: today,
    };
    const {error} = await SB.from("influencers").upsert(
      {handle:c.handle, data:inf, updated_at:new Date().toISOString()},
      {onConflict:"handle"}
    );
    if (error) {
      log("ERR   @"+c.handle+" — "+error.message, "err");
    } else {
      log("added @"+c.handle+" — "+c.niche+" — "+c.followers, "ok");
      added++;
    }
    await new Promise(r=>setTimeout(r,80));
  }

  log("", "");
  log("─────────────────────────────────────", "dim");
  log("Done. Added: "+added+"   Skipped (already exist): "+skipped, "bold");
  log("Open tcc-crm.vercel.app to see your contacts.", "dim");
  btn.textContent = "Done — "+added+" added";
}
